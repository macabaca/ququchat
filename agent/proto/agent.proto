syntax = "proto3";

package agent.v1;

option go_package = "ququchat/agent/pkg/grpcpb;grpcpb";

enum TaskType {
  TASK_TYPE_UNSPECIFIED = 0;
  TASK_TYPE_ADD = 1;
}

message AddRequest {
  int64 a = 1;
  int64 b = 2;
}

message AddResponse {
  TaskType task_type = 1;
  int64 sum = 2;
}

service AgentService {
  rpc Add(AddRequest) returns (AddResponse);
}
