services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ququchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["/bin/sh", "-lc", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server --appendonly yes; fi"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    hostname: ququchat-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_NODENAME: rabbit@ququchat-rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${VECTOR_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  ququchat-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_SECURITY_TOKEN: ${OSS_SECURITY_TOKEN:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      AIGC_API_KEY: ${AIGC_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      VECTOR_API_KEY: ${VECTOR_API_KEY:-}
      MCP_TAVILY_API_KEY: ${MCP_TAVILY_API_KEY:-}
    volumes:
      - ./internal/config/config.yaml:/app/internal/config/config.yaml:ro
      - ./data:/app/data
      - ./bash:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: ["/bin/sh", "-lc", "/app/bin/ququchat-api 2>&1 | tee /app/logs/ququchat.log"]

  ququchat-taskservice:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      RABBITMQ_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_SECURITY_TOKEN: ${OSS_SECURITY_TOKEN:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      AIGC_API_KEY: ${AIGC_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      VECTOR_API_KEY: ${VECTOR_API_KEY:-}
      MCP_TAVILY_API_KEY: ${MCP_TAVILY_API_KEY:-}
    volumes:
      - ./internal/config/config.yaml:/app/internal/config/config.yaml:ro
      - ./data:/app/data
      - ./bash:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["/bin/sh", "-lc", "/app/bin/ququchat-taskservice 2>&1 | tee /app/logs/taskservice.log"]

volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data
  rabbitmq_data:
    name: rabbitmq_data
  qdrant_data:
    name: qdrant_data
  minio_data:
    name: minio_data
