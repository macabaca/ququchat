database:
  driver: postgres
  host: postgres
  port: 5432
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  name: ququchat
  params:
    sslmode: disable
    TimeZone: Asia/Shanghai

redis:
  addr: "redis:6379"
  password: "${REDIS_PASSWORD}"
  db: 0
  key_prefix: "ququchat"
  dial_timeout_ms: 2000
  read_timeout_ms: 1000
  write_timeout_ms: 1000

auth:
  # JWT 密钥，建议生产环境使用长随机字符串，并通过安全方式管理
  jwt_secret: "${AUTH_JWT_SECRET}"
  # 访问令牌有效期（time.ParseDuration 支持的格式，如："15m"、"1h"）
  access_ttl: "15m"
  # 刷新令牌有效期（例如 30 天 = 720 小时）
  refresh_ttl: "720h"
  # 刷新令牌随机字节长度（默认 32）
  refresh_token_bytes: 32

chat:
  history_limit: 50

task:
  queue_high_cap: 256
  queue_normal_cap: 512
  queue_low_cap: 256
  queue_transport: "rabbitmq"
  queue_rabbitmq_url: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
  queue_rabbitmq_name: "ququchat.task.queue"
  queue_rabbitmq_exchange: "ququchat.task.exchange"
  queue_rabbitmq_max_priority: 10
  queue_rabbitmq_max_length: 50000
  done_event_rabbitmq_url: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
  done_event_queue_name: "ququchat.task.done"
  done_event_queue_max_length: 20000
  done_event_queue_message_ttl_ms: 0
  input_retry_max_attempts: 3
  input_retry_delay_ms: 500
  done_publish_retry_max_attempts: 3
  done_publish_retry_delay_ms: 500
  done_consume_retry_max_attempts: 3
  done_consume_retry_delay_ms: 500
  worker_size: 8

task_priority:
  rules:
    - task: "task:fake_llm"
      priority: 3
    - task: "task:llm"
      priority: 2
    - task: "对话"
      priority: 2
    - task: "生成摘要"
      priority: 2
    - task: "agent"
      priority: 1
    - task: "智能体"
      priority: 1
    - task: "rag检索"
      priority: 3
    - task: "添加记忆"
      priority: 3
    - task: "生成rag"
      priority: 2
    - task: "rag"
      priority: 2

file:
  upload_dir: data/uploads
  max_size_bytes: 419430400
  retention: "720h"
  thumbnail:
    max_dimension: 480
    jpeg_quality: 90
    retry_count: 3
    retry_delay: "200ms"
    max_source_bytes: 10485760

avatar:
  max_size_bytes: 41943040
  permanent: true
  retention: "87600h"

storage:
  provider: "oss" # 可选：minio / oss

minio:
  endpoint: "minio:9000"
  access_key: "${MINIO_ACCESS_KEY}"
  secret_key: "${MINIO_SECRET_KEY}"
  bucket: "ququchat"
  use_ssl: false

oss:
  region: "cn-beijing"
  endpoint: "oss-cn-beijing.aliyuncs.com" # 可选：自定义域名或 Endpoint（如 oss-cn-hangzhou.aliyuncs.com）
  access_key_id: "${OSS_ACCESS_KEY_ID}"
  access_key_secret: "${OSS_ACCESS_KEY_SECRET}"
  security_token: "${OSS_SECURITY_TOKEN}" # 可选：STS 临时凭证
  bucket: "ququchat"
  disable_ssl: false
  use_cname: false
  use_path_style: false

llm:
  transport: "rabbitmq"
  rpm: 1000
  tpm: 100000
  rabbitmq_url: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
  request_queue: "ququchat.llm.request"
  request_queue_max_length: 20000
  request_queue_message_ttl_ms: 0
  worker_size: 4
  response_timeout_ms: 60000
  api_key: "${LLM_API_KEY}"
  base_url: "https://api.siliconflow.cn/v1"
  # model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
  model: "deepseek-ai/DeepSeek-V3.2"


aigc:
  transport: "rabbitmq"
  ipm: 2
  ipd: 400
  rabbitmq_url: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
  request_queue: "ququchat.aigc.request"
  request_queue_max_length: 10000
  request_queue_message_ttl_ms: 0
  worker_size: 4
  response_timeout_ms: 120000
  api_key: "${AIGC_API_KEY}"
  base_url: "https://api.siliconflow.cn/v1"
  # model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
  model: "Kwai-Kolors/Kolors"

embedding:
  transport: "rabbitmq"
  rpm: 2000
  tpm: 500000
  rabbitmq_url: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/"
  request_queue: "ququchat.embedding.request"
  request_queue_max_length: 20000
  request_queue_message_ttl_ms: 0
  worker_size: 4
  response_timeout_ms: 60000
  api_key: "${EMBEDDING_API_KEY}"
  base_url: "https://api.siliconflow.cn/v1"
  model: "BAAI/bge-m3"

vector:
  provider: "qdrant"
  qdrant_url: "http://qdrant:6333"
  api_key: "${VECTOR_API_KEY}"
  collection: "chat_segments_v1"
  timeout_ms: 3000
  raw_vector_dim: 1024
  summary_vector_dim: 1024
  distance: "Cosine"

rag_stop_phrases:
  stop_phrases:
    - "1"
    - "2"
    - "3"
    - "6"
    - "66"
    - "666"
    - "ok"
    - "okk"
    - "yes"
    - "no"
    - "嗯"
    - "嗯嗯"
    - "哦"
    - "哦哦"
    - "啊"
    - "啊啊"
    - "哈"
    - "哈哈"
    - "哈哈哈"
    - "好"
    - "行"
    - "行吧"
    - "在吗"
    - "nb"
    - "n"
    - "y"
    - "yep"

rerank:
  enabled: false
  endpoint: "http://127.0.0.1:8001/rerank"
  timeout_ms: 5000
  recall_top_n: 20

mcp_servers:
  tavily:
    type: "streamable_http"
    endpoint: "https://mcp.tavily.com/mcp/"
    api_key: "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"
    headers:
      DEFAULT_PARAMETERS: "{\"include_images\":false,\"search_depth\":\"basic\",\"max_results\":10,\"exclude_domains\":[\"youtube.com\",\"youtu.be\",\"bilibili.com\",\"vimeo.com\",\"youku.com\",\"iqiyi.com\",\"qq.com/x/page\",\"douyin.com\",\"tiktok.com\"]}"
